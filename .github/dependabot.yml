version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: cargo
    directory: /programs/ballast-matcher
    target-branch: dev
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    # solana 1.x -> 2.x is blocked: cargo-build-sbf bundles rustc 1.75 < 2.x MSRV 1.79,
    # and the matcher pins ~1.18 to match Percolator's deployed devnet program. Revisit
    # ONLY as one atomic migration (upgrade local Solana toolchain + move all three crates
    # together). 1.18.x patches still flow. See closed PRs #15/#16 and the tracking issue.
    ignore:
      - dependency-name: "solana-program"
        update-types: ["version-update:semver-major"]
      - dependency-name: "solana-sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "solana-program-test"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    cooldown:
      default-days: 7


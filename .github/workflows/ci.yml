name: CI

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Configure pnpm store
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: |
          IGNORED=$(jq -c '[.allowlist[].ghsa]' audit-allowlist.json)
          AUDIT=$(pnpm audit --json) || true
          VIOLATIONS=$(echo "$AUDIT" | jq --argjson ignored "$IGNORED" \
            '[.advisories // {} | to_entries[].value |
              select(.severity | test("^(high|critical)$")) |
              select(.github_advisory_id as $id | ($ignored | index($id)) == null)] | length')
          if [ "${VIOLATIONS:-1}" -gt 0 ]; then
            echo "Unacceptable high/critical vulnerabilities:"
            echo "$AUDIT" | jq -r --argjson ignored "$IGNORED" \
              '[.advisories // {} | to_entries[].value |
                select(.severity | test("^(high|critical)$")) |
                select(.github_advisory_id as $id | ($ignored | index($id)) == null) |
                "  [\(.severity | ascii_upcase)] \(.title) (\(.github_advisory_id))"] | .[]'
            exit 1
          fi
          echo "Audit passed."

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test with coverage
        run: pnpm exec vitest run --coverage

      - name: Build
        run: pnpm build

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit
        working-directory: programs/ballast-matcher
